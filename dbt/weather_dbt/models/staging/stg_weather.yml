#TODO: Add descriptions
version: 2
models:
  - name: stg_weather
    columns:
      - name: city
        description: "City name"
        tests:
          - not_null
      - name: date
        description: "Observation date"
        tests:
          - not_null
      - name: temp_max_c
        description: "Max temperature (C)"
      - name: temp_min_c
        description: "Min temperature (C)"
      - name: temp_mean_c
        description: "Mean temperature (C)"
      - name: precipitation_mm
        description: "Total precipitation (mm)"
      - name: windspeed_max_kmh
        description: "Max wind speed (km/h)"
      - name: humidity_pct
        description: "Mean relative humidity (%)"
      - name: weather_code
        description: "WMO weather code"
      - name: ingested_at
        description: "Load timestamp"